[build]
  command = "bun install && bun run build"
  functions = "netlify/functions"
  publish = "dashboard/dist"

[build.environment]
  NODE_VERSION = "20"

# SSE endpoint redirects - high priority for both domains
[[redirects]]
  from = "/sse"
  to = "/.netlify/functions/mcp-sse"
  status = 200
  force = true

[[redirects]]
  from = "/mcp/sse"
  to = "/.netlify/functions/mcp-sse"
  status = 200
  force = true

# Domain-specific redirects for MCP and Dashboard domains

# MCP domain configuration
[[redirects]]
  from = "https://mcp.lanonasis.com/sse"
  to = "/.netlify/functions/mcp-sse"
  status = 200
  force = true
  
[[redirects]]
  from = "https://mcp.lanonasis.com/*"
  to = "/.netlify/functions/mcp-sse"
  status = 200
  force = true

# Dashboard domain configuration
[[redirects]]
  from = "https://dashboard.lanonasis.com/api/*"
  to = "https://api.lanonasis.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "https://dashboard.lanonasis.com/*"
  to = "/index.html"
  status = 200

# API redirects - fixed paths
[[redirects]]
  from = "/api/v1/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[context.production.environment]
  LANONASIS_ENV = "production"

[context.deploy-preview.environment]
  LANONASIS_ENV = "preview"

[context.branch-deploy.environment]
  LANONASIS_ENV = "development"

# SPA fallback - lowest priority (after all API and SSE routes)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
